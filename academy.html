<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Academy — Naganath G S Art Studio</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400;1,600&family=DM+Sans:wght@300;400;500;600;700&family=Caveat:wght@400;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --dark:#100c06;--white:#fff;--off:#f9f5ef;--mid:#e0d8cd;--muted:#8a7968;
  --accent:#e8571f;--amber:#f5a623;--nav-h:60px;
}
html,body{height:100%}
body{font-family:'DM Sans',sans-serif;background:var(--dark);color:var(--white);min-height:100vh;display:flex;flex-direction:column}

/* ── NAV ── */
nav{position:fixed;top:0;left:0;right:0;z-index:800;background:rgba(16,12,6,.95);backdrop-filter:blur(8px);height:var(--nav-h);border-bottom:1px solid rgba(255,255,255,.07);display:flex;align-items:center;padding:0 32px;justify-content:space-between}
.nav-logo{font-family:'Cormorant Garamond',serif;font-size:1.25rem;font-weight:700;color:var(--white);text-decoration:none;letter-spacing:.01em}
.nav-logo span{color:var(--amber)}
.nav-links{display:flex;align-items:center;gap:4px;list-style:none}
.nav-links a{font-size:.72rem;font-weight:600;letter-spacing:.07em;text-transform:uppercase;color:rgba(255,255,255,.5);padding:8px 14px;text-decoration:none;transition:color .2s;border-bottom:3px solid transparent}
.nav-links a:hover{color:#fff}
.nav-links a.active{color:var(--accent);border-bottom-color:var(--accent)}
@media(max-width:768px){.nav-links{display:none}nav{padding:0 20px}}

/* ── MAIN ── */
main{flex:1;display:flex;align-items:center;justify-content:center;padding:var(--nav-h) 24px 0;min-height:100vh}

/* ── COMING SOON CARD ── */
.cs-wrap{text-align:center;max-width:600px;width:100%;position:relative}

/* Decorative corner lines */
.cs-wrap::before{content:'';position:absolute;top:-20px;left:-20px;width:60px;height:60px;border-top:2px solid var(--accent);border-left:2px solid var(--accent)}
.cs-wrap::after{content:'';position:absolute;bottom:-20px;right:-20px;width:60px;height:60px;border-bottom:2px solid var(--amber);border-right:2px solid var(--amber)}

.cs-tag{font-size:.65rem;font-weight:700;letter-spacing:.2em;text-transform:uppercase;color:var(--accent);margin-bottom:20px;display:block}
.cs-title{font-family:'Cormorant Garamond',serif;font-size:clamp(3rem,8vw,5.5rem);font-weight:700;line-height:1;margin-bottom:10px}
.cs-title span{color:var(--accent);font-style:italic}
.cs-sub{font-family:'Caveat',cursive;font-size:clamp(1.2rem,3vw,1.6rem);color:var(--amber);margin-bottom:32px;opacity:.85}
.cs-divider{width:60px;height:2px;background:linear-gradient(to right,var(--accent),var(--amber));margin:0 auto 32px}
.cs-desc{font-size:.95rem;color:rgba(255,255,255,.5);line-height:1.8;margin-bottom:48px;max-width:420px;margin-left:auto;margin-right:auto}

/* Animated dots */
.cs-dots{display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:48px}
.cs-dot{width:8px;height:8px;border-radius:50%;background:var(--accent);opacity:.3;animation:dotPulse 1.6s ease-in-out infinite}
.cs-dot:nth-child(2){animation-delay:.3s;background:var(--amber)}
.cs-dot:nth-child(3){animation-delay:.6s}
@keyframes dotPulse{0%,100%{opacity:.3;transform:scale(1)}50%{opacity:1;transform:scale(1.4)}}

/* Back button */
.cs-back{display:inline-flex;align-items:center;gap:8px;padding:12px 28px;background:transparent;border:1.5px solid rgba(255,255,255,.2);color:rgba(255,255,255,.7);font-family:'DM Sans',sans-serif;font-size:.72rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;text-decoration:none;cursor:pointer;transition:all .25s}
.cs-back:hover{border-color:var(--accent);color:var(--accent)}
.cs-back svg{transition:transform .25s}
.cs-back:hover svg{transform:translateX(-4px)}

/* Background glow */
.bg-glow{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);width:700px;height:700px;border-radius:50%;background:radial-gradient(ellipse,rgba(232,87,31,.08) 0%,transparent 65%);pointer-events:none;z-index:0}
.cs-wrap{position:relative;z-index:1}
</style>
</head>
<body>

<!-- NAV -->
<nav>
  <a href="index.html" class="nav-logo">Naga<span>N</span>ath G S</a>
  <ul class="nav-links">
    <li><a href="index.html">Home</a></li>
    <li><a href="portfolio.html">Portfolio</a></li>
    <li><a href="store.html">Store</a></li>
    <li><a href="academy.html" class="active">Academy</a></li>
  </ul>
</nav>

<div class="bg-glow"></div>

<main>
  <div class="cs-wrap">
    <span class="cs-tag">Naganath G S Art Studio</span>
    <h1 class="cs-title">Art <span>Academy</span></h1>
    <p class="cs-sub">Something beautiful is on its way...</p>
    <div class="cs-divider"></div>
    <p class="cs-desc">We're crafting an immersive learning experience for aspiring artists. Courses, workshops, and live sessions — all coming soon.</p>
    <div class="cs-dots">
      <div class="cs-dot"></div>
      <div class="cs-dot"></div>
      <div class="cs-dot"></div>
    </div>
    <a href="index.html" class="cs-back">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg>
      Back to Home
    </a>
  </div>
</main>

</body>
</html>
